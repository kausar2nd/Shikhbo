<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>শিখবো - Shikhbo</title>
  <link rel="stylesheet" href="/static/css/landing.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
    rel="stylesheet">
</head>

<body>

  <!-- Background grid -->
  <div class="bg-grid"></div>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <!-- Main container -->
  <div class="landing-wrapper">

    <header class="site-header" style="justify-content: space-between;">
      <div class="logo">
        <span class="logo-icon">⬡</span>
        <span class="logo-text">শিখবো - Shikhbo</span>
      </div>
      <button id="langToggleBtn" onclick="toggleLanguage()" class="lang-toggle">English</button>
    </header>

    <main class="hero">
      <div class="hero-text-content">
        <p class="hero-label" data-en="Your AI Study Partner" data-bn="তোমার AI স্টাডি পার্টনার">তোমার AI স্টাডি
          পার্টনার</p>
        <h1 class="hero-title" data-en="Learn smarter,<br><em>not harder.</em>"
          data-bn="শেখার স্মার্ট সলিউশন<br><em>এখন বই থেকেই</em>">আপনার সার্বক্ষণিক,<br><em>আপনার সার্বক্ষণিক স্টাডি
            পার্টনার।</em></h1>
        <p class="hero-sub" data-en="Tough topics, now in your pocket. Study made easy, step by step, your way."
          data-bn="কঠিন টপিক এখন হাতের মুঠোয়। পড়াশোনা হোক সহজ, ধাপে ধাপে, নিজের মতো।">কঠিন টপিক এখন হাতের মুঠোয়। পড়াশোনা
          হোক সহজ, ধাপে ধাপে, নিজের মতো</p>
      </div>

      <div class="auth-panel" id="authPanel">
        <!-- TAB BAR -->
        <div class="tab-bar">
          <button class="tab active" id="tabLogin" onclick="switchTab('login')" data-en="Log In" data-bn="লগ ইন">লগ
            ইন</button>
          <button class="tab" id="tabSignup" onclick="switchTab('signup')" data-en="Sign Up"
            data-bn="রেজিস্টার">রেজিস্টার</button>
        </div>

        <!-- LOGIN FORM -->
        <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
          <div class="field-group">
            <label data-en="Email" data-bn="ইমেইল">ইমেইল</label>
            <input type="email" id="loginEmail" placeholder="you@school.edu" required />
          </div>
          <div class="field-group">
            <label data-en="Password" data-bn="পাসওয়ার্ড">পাসওয়ার্ড</label>
            <input type="password" id="loginPassword" data-en="••••••••" data-bn="••••••••" placeholder="••••••••"
              required />
          </div>
          <div class="error-msg" id="loginError"></div>
          <button type="submit" class="btn-primary" id="loginBtn">
            <span class="btn-text" data-en="Log In" data-bn="লগ ইন">লগ ইন</span>
            <span class="btn-loader" style="display:none">●●●</span>
          </button>
          <p class="switch-hint"
            data-en="Don't have an account? <a href='#' onclick='switchTab(&quot;signup&quot;); return false;'>Sign Up</a>"
            data-bn="অ্যাকাউন্ট নেই? <a href='#' onclick='switchTab(&quot;signup&quot;); return false;'>রেজিস্টার করো</a>">
            অ্যাকাউন্ট নেই? <a href="#" onclick="switchTab('signup'); return false;">রেজিস্টার করো</a></p>
        </form>

        <!-- SIGN UP FORM -->
        <form id="signupForm" class="auth-form" onsubmit="handleSignup(event)">
          <div class="field-group">
            <label data-en="Full Name" data-bn="পুরো নাম">পুরো নাম</label>
            <input type="text" id="signupName" data-en="Your name" data-bn="তোমার নাম" placeholder="তোমার নাম"
              required />
          </div>
          <div class="field-group">
            <label data-en="Email" data-bn="ইমেইল">ইমেইল</label>
            <input type="email" id="signupEmail" placeholder="you@school.edu" required />
          </div>
          <div class="fields-row">
            <div class="field-group">
              <label data-en="Curriculum" data-bn="কারিকুলাম">কারিকুলাম</label>
              <select id="signupCurriculum" required onchange="populateClassDropdown(this.value, 'signupClass')">
                <option value="" data-en="Select…" data-bn="নির্বাচন করো…">নির্বাচন করো…</option>
                <option value="NCTB (Bangla)">NCTB (Bangla)</option>
                <option value="NCTB (English)">NCTB (English)</option>
                <option value="Madrasah">Madrasah</option>
                <option value="Edexcel">Edexcel</option>
                <option value="Cambridge">Cambridge</option>
                <option value="IB">IB</option>
              </select>
            </div>
            <div class="field-group">
              <label data-en="Class / Grade" data-bn="ক্লাস">ক্লাস</label>
              <select id="signupClass" required disabled>
                <option value="" data-en="Select curriculum first" data-bn="আগে কারিকুলাম নির্বাচন করো">আগে কারিকুলাম নির্বাচন করো</option>
              </select>
            </div>
          </div>
          <div class="field-group">
            <label data-en="Password" data-bn="পাসওয়ার্ড">পাসওয়ার্ড</label>
            <input type="password" id="signupPassword" data-en="Min 6 characters" data-bn="কমপক্ষে ৬ অক্ষর" placeholder="কমপক্ষে ৬ অক্ষর"
              required minlength="6" />
          </div>
          <div class="error-msg" id="signupError"></div>
          <button type="submit" class="btn-primary" id="signupBtn">
            <span class="btn-text" data-en="Create Account" data-bn="অ্যাকাউন্ট তৈরি করো">অ্যাকাউন্ট তৈরি করো</span>
            <span class="btn-loader" style="display:none">●●●</span>
          </button>
          <p class="switch-hint"
            data-en="Already have an account? <a href='#' onclick='switchTab(&quot;login&quot;); return false;'>Log In</a>"
            data-bn="অ্যাকাউন্ট আছে? <a href='#' onclick='switchTab(&quot;login&quot;); return false;'>লগ ইন করো</a>">
            অ্যাকাউন্ট আছে? <a href="#" onclick="switchTab('login'); return false;">লগ ইন করো</a></p>
        </form>
      </div>
    </main>
    <footer class="site-footer">
      <span>Shikhbo © 2026</span>
    </footer>

  </div>

  <script src="/static/js/lang.js"></script>
  <script src="/static/js/landing.js"></script>
</body>

</html>
